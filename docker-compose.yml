services:
  postgres:
    image: postgres:16-alpine
    container_name: korp-postgres
    environment:
      POSTGRES_USER: korp
      POSTGRES_PASSWORD: korp_dev_change_me
    ports:
      - "5432:5432"
    volumes:
      - korp_pgdata:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro

  pgadmin:
    image: dpage/pgadmin4:8.14
    container_name: korp-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@korp.local
      PGADMIN_DEFAULT_PASSWORD: admin_dev_change_me
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  korp_pgdata:
